{% extends "base.html" %}
{% block tytul %}{{ 'Edycja produktu' if produkt else 'Nowy produkt' }} - Panel{% endblock %}

{% block tresc %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>{{ 'Edycja produktu' if produkt else 'Nowy produkt' }}</h3>
  <a href="{{ url_for('admin_produkty') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Powrot do listy
  </a>
</div>

<form method="post" style="max-width: 680px">
  <div class="mb-3">
    <label class="form-label">Nazwa</label>
    <input name="nazwa" class="form-control" required maxlength="150"
           value="{{ produkt.nazwa if produkt else '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Opis</label>
    <textarea name="opis" class="form-control" rows="3" maxlength="2000">{{ produkt.opis if produkt else '' }}</textarea>
  </div>

  <div class="row">
    <div class="col mb-3">
      <label class="form-label">Cena (zl)</label>
      <input name="cena" type="number" step="0.01" min="0" class="form-control" required
             value="{{ '%.2f'|format(produkt.cena) if produkt else '' }}">
    </div>
    <div class="col mb-3">
      <label class="form-label">Stan magazynowy</label>
      <input name="stan_magazynowy" type="number" min="0" class="form-control" required
             value="{{ produkt.stan_magazynowy if produkt else '' }}">
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Kategoria</label>
    <select name="id_kategorii" class="form-select" required>
      {% for k in kategorie %}
        <option value="{{ k.id_kategorii }}"
          {{ 'selected' if produkt and produkt.id_kategorii == k.id_kategorii }}>{{ k.nazwa }}</option>
      {% endfor %}
    </select>
  </div>

  {% if produkt %}
  <div class="mb-3">
    <label class="form-label">Status</label>
    <select name="aktywny" class="form-select">
      <option value="T" {{ 'selected' if produkt.aktywny == 'T' }}>T - widoczny w sklepie</option>
      <option value="N" {{ 'selected' if produkt.aktywny == 'N' }}>N - ukryty</option>
    </select>
  </div>
  {% endif %}

  <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg"></i> Zapisz</button>
  <a href="{{ url_for('admin_produkty') }}" class="btn btn-outline-secondary">Anuluj</a>
</form>
{% endblock %}
